# Development overrides — live code sync and debug logging.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml watch

services:
  api-gateway:
    environment:
      COWLY_LOG_LEVEL: ${COWLY_LOG_LEVEL:-debug}
    develop:
      watch:
        - action: sync
          path: ./api-gateway/app
          target: /app/app
        - action: rebuild
          path: ./api-gateway/requirements.txt

  auth-service:
